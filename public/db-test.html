<!DOCTYPE html>

<html>

<head>

    <title>DB Test</title>

    <link rel="stylesheet" href="db-test.css">

    <script>
window.MathJax = {
  tex: {
    inlineMath: [
      ['$', '$'],
      ['\\(', '\\)']
    ],
    displayMath: [
      ['$$', '$$'],
      ['\\[', '\\]']
    ]
  }
};
</script>

    <script

      id="MathJax-script"

      async

      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">

    </script>

</head>

<body>

<div id="result" style="display:none;">

    <h2 id="finalScore"></h2>

    <h3 id="correctCount"></h3>

    <h3 id="wrongCount"></h3>

    <h3 id="unattemptedCount"></h3>

</div>

<div class="mainLayout">

<div class="leftPanel">
    <h2 id="timer">

Loading Timer...

</h2>

    <div id="questionWrapper">
        

    <h2 id="question">

        Loading...

    </h2>

    <div id="questionImage">

    </div>

</div>

<div id="options"></div>

    <br>

<button onclick="previousQuestion()">
Previous
</button>

<button class="test-btn" onclick="saveAndNext()">
Save & Next
</button>

<button class="test-btn" onclick="clearResponse()">
Clear Response
</button>

<button class="test-btn" onclick="markForReview()">
Mark For Review <br> & Next
</button>
<button
    class="test-btn" onclick="toggleBookmark()">
Bookmark
</button>

<button class="test-btn" onclick="submitTest()">
Submit Test
</button>
</div>

<div class="rightPanel">

<h3 id="paletteTitle">

Question Palette

</h3>

<div id="palette">

</div>

</div>

</div>

    <script src="db-test.js"></script>

</body>

</html>
