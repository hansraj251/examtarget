<div id="editNoteModal" class="note-modal">


    <div class="note-modal-content">

        <h2>Edit Note</h2>

        <input
            type="text"
            id="editNoteTitle"
            placeholder="Title"
        >

        <textarea
            id="editNoteText"
            rows="12"
        ></textarea>

        <div class="note-modal-actions">

            <button
                onclick="closeEditNoteModal()"
            >
                Cancel
            </button>

            <button
                onclick="updateNote()"
            >
                Update Note
            </button>

        </div>

    </div>

</div>
<div id="deleteNoteModal" class="note-modal">

    <div class="note-modal-content delete-modal">

        <h2>Delete Note</h2>

        <p>

            Are you sure you want to delete this note?

        </p>

        <div class="note-modal-actions">

            <button
                onclick="closeDeleteModal()"
            >
                Cancel
            </button>

            <button
                class="danger-btn"
                onclick="confirmDeleteNote()"
            >
                Delete
            </button>

        </div>

    </div>

</div>
<div
id="leaderboardModal"
class="modal"
>

<div class="modal-content">

<h2>

🏆 Leaderboard

</h2>

<div
id="leaderboardContent"
>

Loading...

</div>

<br>

<button
class="test-btn"
onclick="closeLeaderboard()"
>

Close

</button>

</div>

</div>
<div
id="confirmModal"
class="confirm-modal"
style="display:none;"
>

    <div class="confirm-box">

        <h3 id="confirmTitle"></h3>

        <p id="confirmMessage"></p>

        <div class="confirm-actions">

    <button
class="confirm-btn cancel-btn"
onclick="closeConfirmModal()">
    Cancel
</button>

<button
class="confirm-btn confirm-btn-primary"
onclick="runConfirmAction()">
    Confirm
</button>

</div>

    </div>
